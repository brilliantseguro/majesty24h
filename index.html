<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majesty</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: white;

      background:
        linear-gradient(rgba(0, 80, 30, 0.75), rgba(0, 80, 30, 0.85)),
        url('fondo.png');
      background-size: cover;
      background-position: center;
    }

    .container {
      max-width: 420px;
      padding: 20px;
    }

    img {
      width: 100%;
      max-width: 320px;
      margin: 20px 0;
      filter: drop-shadow(0 0 12px rgba(0,0,0,0.7));
    }

    /* BARRA DE TIEMPO */
    .progress-box {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #25D366, #00ff88);
      animation: countdown 30s linear forwards;
    }

    @keyframes countdown {
      from { width: 100%; }
      to { width: 0%; }
    }

    .texto {
      margin: 12px 0 18px;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(0,0,0,0.6);
    }

    .btn {
      display: inline-block;
      background: #25D366;
      color: white;
      padding: 15px 25px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      margin: 10px 0 20px;
      box-shadow: 0 0 18px rgba(37,211,102,0.7);
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: scale(1.07);
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO ARRIBA -->
    <img src="logo.png" alt="Majesty">

    <!-- BARRA -->
    <div class="progress-box">
      <div class="progress-bar"></div>
    </div>

    <!-- TEXTO -->
    <div class="texto">Tiempo para reclamar el BONO del 30%...</div>

    <!-- BOTÓN -->
    <a class="btn"
       href="https://wa.me/543413673831?text=Holaa%20vengo%20a%20jug4r%20con%20mi%2030%25%20EXTRA%20por%20parte%20de%20Noraly%20Barrionuevo%20🥳🎁%20codigo:%20al%20azar%20todo%20el%20tiempo"
       target="_blank">
       RECLAMAR BONO
    </a>

    <!-- LOGO ABAJO -->
    <img src="logo2.png" alt="Ganamos">

  </div>

</body>
</html>
