<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Majesty</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:
  linear-gradient(rgba(0,80,30,.75),rgba(0,80,30,.85)),
  url('fondo.png');
  background-size:cover;
}

.container{
  max-width:420px;
  margin:auto;
  padding:18px 20px 30px;
}

/* LOGOS */
.logo-top{
  max-width:300px;
  margin:0 auto 10px;
  display:block;
}

.logo-bottom{
  max-width:160px;
  margin:50px auto 20px;
  display:block;
}

/* TOAST */
.toast{
  margin:-8px auto 14px;
  background:rgba(255,255,255,.12);
  padding:12px;
  border-radius:14px;
}

.stars{color:#ffd76a;font-weight:bold;}
.city{color:rgba(210,210,210,.8);font-size:13px;}
.label{font-weight:900;}
.action{color:#00ff88;font-weight:900;}

/* BOTÓN */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;

  background:linear-gradient(180deg,#31e97b,#18b957);
  color:#fff;
  padding:16px 28px;
  border-radius:999px;
  font-size:19px;
  font-weight:900;
  margin:22px 0;
  text-decoration:none;

  border:2px solid rgba(0,0,0,.6);

  box-shadow:
  0 0 20px rgba(37,211,102,.9),
  0 10px 25px rgba(0,0,0,.4);

  animation:pulse 1s infinite;
}

.wsp-icon{
  width:22px;
  height:22px;
  filter:invert(1);
}

@keyframes pulse{
  50%{transform:scale(1.08);}
}

/* BARRA */
.progress-box{
  position:relative;
  height:22px;
  background:#1b1b1b;
  border-radius:25px;
  overflow:hidden;
  margin-top:18px;
}

.progress-bar{
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#00ff88,#25D366);
  animation:countdown 30s linear forwards;
}

.timer{
  position:absolute;
  width:100%;
  top:0;
  left:0;
  line-height:22px;
  font-size:13px;
  font-weight:bold;
}

@keyframes countdown{
  from{width:100%;}
  to{width:0%;}
}

/* TEXTO */
.texto{
  margin:12px 0;
  font-weight:bold;
}

.gold{color:#ffd76a;}

/* SLOTS */
.slots-title{
  margin-top:20px;
  font-size:18px;
  font-weight:900;
}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:10px;
}

.slot-card img{
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<img class="logo-top" src="logo.png">

<div class="toast">
<div class="stars">★★★★★</div>
<div id="toastText">
<div class="city">Rosario</div>
<div>
<span class="label">usuario:</span> neominb31
<span class="action"> está reclamando el bono</span>
</div>
</div>
</div>

<a class="btn"
href="https://wa.me/543413673831?text=Holaa%20vengo%20a%20jug4r%20con%20mi%2030%25%20EXTRA%20por%20parte%20de%20Noraly%20Barrionuevo"
target="_blank">

<img src="whatsapp.png" class="wsp-icon">

RECLAMAR BONO
</a>

<div class="progress-box">
<div class="progress-bar"></div>
<div class="timer" id="timer">30s</div>
</div>

<div class="texto">
Tiempo para reclamar el BONO del <span class="gold">30%</span> ...
</div>

<img class="logo-bottom" src="logo2.png">

<div class="slots-title">
+3.000 SLOTS
</div>

<div class="cards-grid">
<div class="slot-card"><img src="slot1.png"></div>
<div class="slot-card"><img src="slot2.png"></div>
<div class="slot-card"><img src="slot3.png"></div>
<div class="slot-card"><img src="slot4.png"></div>
</div>

</div>

<script>
let t=30;
setInterval(()=>{
t--;
if(t<=0)t=0;
document.getElementById("timer").innerText=t+"s";
},1000);
</script>

</body>
</html>
