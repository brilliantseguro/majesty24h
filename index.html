<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majesty</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: white;

      background:
        linear-gradient(rgba(0, 80, 30, 0.75), rgba(0, 80, 30, 0.85)),
        url('fondo.png');
      background-size: cover;
      background-position: center;
    }

    .container {
      max-width: 420px;
      padding: 20px;
    }

    .logo-top {
      max-width: 260px;
      margin: -90px auto 10px;
      display: block;
    }

    .logo-bottom {
      max-width: 160px;
      margin: 18px auto 0;
      display: block;
    }

    img {
      width: 100%;
      filter: drop-shadow(0 0 12px rgba(0,0,0,0.7));
    }

    /* TOAST */
    .toast{
      max-width: 320px;
      margin: 0 auto 14px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      padding: 12px 14px;
      border-radius: 14px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
      min-height: 72px;
    }

    .stars{
      color: #ffd76a;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .city{
      color: #ff9f1a;
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .user{
      color: #fff;
      font-weight: 700;
      font-size: 14px;
    }

    .action{
      color: #00ff88;
      font-weight: 900;
    }

    /* BARRA */
    .progress-box {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #25D366, #00ff88);
      animation: countdown 30s linear forwards;
    }

    @keyframes countdown {
      from { width: 100%; }
      to { width: 0%; }
    }

    .texto {
      margin: 10px 0 16px;
      font-size: 18px;
      font-weight: bold;
    }

    .texto .gold {
      color: #ffd76a;
      font-weight: 900;
    }

    .btn {
      display: inline-block;
      background: #25D366;
      color: white;
      padding: 15px 25px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      margin: 10px 0 20px;
      box-shadow: 0 0 18px rgba(37,211,102,0.7);
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: scale(1.07);
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO ARRIBA -->
    <img class="logo-top" src="logo.png">

    <!-- TOAST -->
    <div class="toast">
      <div class="stars">★★★★★</div>
      <div id="toastText">
        <div class="city">Rosario</div>
        <div class="user">
          usuario: neominb31 
          <span class="action">está reclamando el bono</span>
        </div>
      </div>
    </div>

    <!-- BARRA -->
    <div class="progress-box">
      <div class="progress-bar"></div>
    </div>

    <!-- TEXTO -->
    <div class="texto">
      Tiempo para reclamar el BONO del <span class="gold">30%</span>...
    </div>

    <!-- BOTÓN -->
    <a class="btn"
       href="https://wa.me/543413673831?text=Holaa%20vengo%20a%20jug4r%20con%20mi%2030%25%20EXTRA%20por%20parte%20de%20Noraly%20Barrionuevo%20🥳🎁%20codigo:%20al%20azar%20todo%20el%20tiempo"
       target="_blank">
       RECLAMAR BONO
    </a>

    <!-- LOGO ABAJO -->
    <img class="logo-bottom" src="logo2.png">

  </div>

  <script>
    const mensajes = [
      {city:"Rosario", user:"neominb31"},
      {city:"Santa Fe Capital", user:"marianb43"},
      {city:"Rafaela", user:"lucasnb41"},
      {city:"Venado Tuerto", user:"agus_87"},
      {city:"Cañada de Gómez", user:"fede77"},
      {city:"Reconquista", user:"tino44"},
      {city:"Esperanza", user:"roxii91"},
      {city:"San Lorenzo", user:"mati88"},
      {city:"Villa Constitución", user:"juanp33"},
      {city:"Santo Tomé", user:"luli29"}
    ];

    let i = 0;
    const toastText = document.getElementById("toastText");

    setInterval(() => {
      i = (i + 1) % mensajes.length;
      const data = mensajes[i];

      toastText.innerHTML = `
        <div class="city">${data.city}</div>
        <div class="user">
          usuario: ${data.user}
          <span class="action"> está reclamando el bono</span>
        </div>
      `;
    }, 2000);
  </script>

</body>
</html>
