<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Majesty</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:
  linear-gradient(rgba(0,80,30,.75),rgba(0,80,30,.85)),
  url('fondo.png');
  background-size:cover;
}

.container{
  max-width:420px;
  margin:auto;
  padding:18px 20px 30px;
}

/* LOGOS */
.logo-top{
  max-width:240px;
  margin:-10px auto 10px;
  display:block;
}

.logo-bottom{
  max-width:160px;
  margin:50px auto 20px;
  display:block;
}

/* TOAST */
.toast{
  margin:0 auto 14px;
  background:rgba(255,255,255,.12);
  padding:12px;
  border-radius:14px;
}

.city{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  color:rgba(210,210,210,.85);
  font-size:13px;
  font-weight:700;
}

.city svg{
  width:14px;
  height:14px;
  fill:rgba(210,210,210,.85);
}

.stars{
  color:#ffd76a;
  margin:3px 0;
}

.label{font-weight:900;}
.action{color:#00ff88;font-weight:900;}

/* BOTON */
.btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:linear-gradient(180deg,#31e97b,#18b957);
  color:#fff;
  padding:16px 28px;
  border-radius:999px;
  font-size:19px;
  font-weight:900;
  margin:22px 0;
  text-decoration:none;
  border:2px solid rgba(0,0,0,.35);
  box-shadow:
  0 0 25px rgba(37,211,102,1),
  0 10px 25px rgba(0,0,0,.3);
  animation:pulse .8s infinite;
}

.btn svg{
  width:22px;
  height:22px;
  fill:white;
}

@keyframes pulse{
  50%{transform:scale(1.12);}
}

/* BARRA */
.progress-box{
  position:relative;
  height:22px;
  border-radius:25px;
  overflow:hidden;
  margin-top:18px;
  background:
  repeating-linear-gradient(
  -45deg,
  rgba(255,255,255,.10) 0px,
  rgba(255,255,255,.10) 8px,
  rgba(255,255,255,.03) 8px,
  rgba(255,255,255,.03) 16px);
}

.progress-bar{
  position:absolute;
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#00ff88,#25D366);
  animation:countdown 30s linear forwards;
}

.timer{
  position:absolute;
  width:100%;
  line-height:22px;
  font-weight:bold;
}

@keyframes countdown{
  from{width:100%;}
  to{width:0%;}
}

/* TEXTO */
.texto{
  margin:12px 0;
}

.gold{
  color:#ffd76a;
  font-weight:900;
}

/* SLOTS */
.slots-title{
  margin-top:20px;
  font-size:22px;
  font-weight:900;
}

.slots-subtitle{
  font-size:13px;
}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-top:12px;
}

.slot-card{
  border-radius:14px;
  overflow:hidden;
}

.slot-card img{
  width:100%;
  height:110px;
  object-fit:cover;
  display:block;
}

.slot-name{
  margin:0;
  background:rgba(0,0,0,.5);
  padding:6px;
  font-size:13px;
  font-weight:800;
}
</style>
</head>

<body>

<div class="container">

<img class="logo-top" src="logo.png">

<div class="toast">
<div id="toastText"></div>
</div>

<a class="btn" href="https://wa.me/543413673831" target="_blank">

<svg viewBox="0 0 32 32">
<path d="M16 .4C7.4.4.4 7.4.4 16c0 2.8.7 5.5 2.1 7.9L.4 31.6l7.9-2.1c2.3 1.3 5 2.1 7.7 2.1 8.6 0 15.6-7 15.6-15.6S24.6.4 16 .4z"/>
</svg>

RECLAMAR BONO
</a>

<div class="progress-box">
<div class="progress-bar"></div>
<div class="timer" id="timer">30s</div>
</div>

<div class="texto">
Tiempo para reclamar el <strong>BONO</strong> del <span class="gold">30%</span> ...
</div>

<img class="logo-bottom" src="logo2.png">

<div class="slots-title">+3.000 SLOTS</div>
<div class="slots-subtitle">Recomendados de la semana:</div>

<div class="cards-grid">
<div class="slot-card"><img src="slot1.png"><div class="slot-name">Spaceman</div></div>
<div class="slot-card"><img src="slot2.png"><div class="slot-name">Sweet Bonanza</div></div>
<div class="slot-card"><img src="slot3.png"><div class="slot-name">Gates of Olympus</div></div>
<div class="slot-card"><img src="slot4.png"><div class="slot-name">Big Bass</div></div>
</div>

</div>

<script>
let t=30;
setInterval(()=>{
t--;
if(t<=0)t=0;
document.getElementById("timer").innerText=t+"s";
},1000);

const mensajes=[
"Rosario|lucas91","Rafaela|mili22","Santa Fe|agus77","Venado Tuerto|mati88",
"Reconquista|tomi44","Esperanza|luca33","San Lorenzo|facu11","Villa Constitución|juli90",
"Santo Tomé|nico21","Rosario|cami55","Rafaela|tata66","Santa Fe|gabi77",
"Venado Tuerto|lucho88","Esperanza|maru99","Reconquista|pepe12","San Lorenzo|santi23",
"Villa Constitución|emi45","Santo Tomé|luana76","Rosario|rodrigo7","Rafaela|enzo19"
];

let i=0;

setInterval(()=>{
i=(i+1)%mensajes.length;
let [city,user]=mensajes[i].split("|");

document.getElementById("toastText").innerHTML=`
<div class="city">
<svg viewBox="0 0 24 24"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/></svg>
${city}
</div>
<div class="stars">★★★★★</div>
<div><span class="label">usuario:</span> ${user} <span class="action"> está reclamando el bono</span></div>
`;
},2000);
</script>

</body>
</html>
