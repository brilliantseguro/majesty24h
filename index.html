<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majesty</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background:
        linear-gradient(rgba(0, 80, 30, 0.75), rgba(0, 80, 30, 0.85)),
        url('fondo.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .container {
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
      padding: 18px 20px 30px;
      box-sizing: border-box;
    }

    /* 🔥 LOGO MÁS GRANDE (+50%) */
    .logo-top {
      max-width: 330px;
      width: 100%;
      display: block;
      margin: 0 auto 16px;
      filter: drop-shadow(0 0 14px rgba(0,0,0,0.7));
    }

    .logo-bottom {
      max-width: 160px;
      width: 100%;
      display: block;
      margin: 50px auto 20px;
      filter: drop-shadow(0 0 12px rgba(0,0,0,0.7));
    }

    .toast {
      max-width: 320px;
      margin: 0 auto 18px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 12px 14px;
      border-radius: 14px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
    }

    .stars {
      color: #ffd76a;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 2px;
    }

    .city {
      color: rgba(210,210,210,0.78);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .user {
      color: #fff;
      font-size: 14px;
    }

    .label {
      font-weight: 900;
    }

    .action {
      color: #00ff88;
      font-weight: 900;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(180deg, #31e97b, #18b957);
      color: white;
      padding: 16px 28px;
      border-radius: 999px;
      font-size: 19px;
      font-weight: 900;
      margin: 24px 0;
      text-decoration: none;
      animation: pulse 1.3s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* 🔽 BAJAMOS TODO DESDE LA BARRA */
    .progress-box {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      overflow: hidden;
      margin-top: 18px; /* MÁS ABAJO */
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #25D366, #00ff88);
      animation: countdown 30s linear forwards;
    }

    .texto {
      margin: 16px 0 10px; /* MÁS SEPARACIÓN */
      font-size: 18px;
      font-weight: bold;
    }

    .gold {
      color: #ffd76a;
      font-weight: 900;
    }

    .cards-section {
      margin-top: 22px; /* MÁS ABAJO */
    }

    .cards-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .slot-card {
      background: rgba(255,255,255,0.10);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .slot-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .slot-name {
      padding: 10px;
      font-size: 14px;
      font-weight: 800;
    }
  </style>
</head>

<body>

  <div class="container">

    <img class="logo-top" src="logo.png">

    <div class="toast">
      <div class="stars">★★★★★</div>
      <div id="toastText">
        <div class="city">Rosario</div>
        <div class="user">
          <span class="label">usuario:</span> neominb31
          <span class="action"> está reclamando el bono</span>
        </div>
      </div>
    </div>

    <a class="btn"
       href="https://wa.me/543413673831?text=Holaa%20vengo%20a%20jug4r%20con%20mi%2030%25%20EXTRA%20por%20parte%20de%20Noraly%20Barrionuevo%20🥳🎁%20codigo:%20al%20azar%20todo%20el%20tiempo"
       target="_blank">
       RECLAMAR BONO
    </a>

    <div class="progress-box">
      <div class="progress-bar"></div>
    </div>

    <div class="texto">
      Tiempo para reclamar el BONO del <span class="gold">30%</span>...
    </div>

    <img class="logo-bottom" src="logo2.png">

    <div class="cards-section">
      <div class="cards-title">Juegos disponibles</div>

      <div class="cards-grid">
        <div class="slot-card">
          <img src="slot1.png">
          <div class="slot-name">Spaceman</div>
        </div>

        <div class="slot-card">
          <img src="slot2.png">
          <div class="slot-name">Sweet Bonanza</div>
        </div>

        <div class="slot-card">
          <img src="slot3.png">
          <div class="slot-name">Gates of Olympus</div>
        </div>

        <div class="slot-card">
          <img src="slot4.png">
          <div class="slot-name">Big Bass</div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
