.toast{

.stars{color:#ffd76a;font-weight:bold;}

.btn{

  color:#fff;

  font-weight:900;

  animation:pulse 1s infinite;
}

.btn svg{
  width:22px;
  height:22px;
  fill:white;
}

@keyframes pulse{
  50%{transform:scale(1.08);}
}

/* BARRA */
.progress-box{
  position:relative;
  height:22px;
  background:#1b1b1b;
  border-radius:25px;
  overflow:hidden;
  margin-top:18px;
}

.progress-bar{
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#00ff88,#25D366);
  animation:countdown 30s linear forwards;
}

.timer{
  position:absolute;
  width:100%;
  top:0;
  left:0;
  line-height:22px;
  font-size:13px;
  font-weight:bold;
}

@keyframes countdown{
  from{width:100%;}
  to{width:0%;}
}

/* TEXTO */
.texto{
  margin:12px 0;
  font-weight:bold;
}

.gold{color:#ffd76a;}

/* SLOTS */

.cards-grid{

  margin-top:10px;
}

.slot-card{

.slot-card img{
