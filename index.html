<style>
body{
  margin:0;

  color:white;

}

.container{
  max-width:420px;

  padding:18px 20px 30px;
}

/* LOGOS */
.logo-top{
  max-width:300px;
  margin:0 auto 10px;
  display:block;
}

.logo-bottom{
  max-width:160px;
  margin:50px auto 20px;
  display:block;
}

/* TOAST */
.toast{
  margin:-8px auto 14px;
  background:rgba(255,255,255,.12);
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  backdrop-filter:blur(6px);
}

.stars{
  color:#ffd76a;
  font-weight:bold;
}

.city{
  color:rgba(210,210,210,.8);
  font-size:13px;
  margin-top:2px;
}

.label{
  font-weight:900;
}

.action{
  color:#00ff88;
  font-weight:900;
}

/* BOTÓN */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:linear-gradient(180deg,#31e97b,#18b957);
  color:#fff;
  padding:16px 28px;
  border-radius:999px;
  font-size:19px;
  font-weight:900;
  margin:22px 0;
  text-decoration:none;
  border:2px solid rgba(0,0,0,.35);
  box-shadow:
    0 0 20px rgba(37,211,102,.9),
    0 10px 25px rgba(0,0,0,.28);
  animation:pulse 1s infinite;
}

.btn svg{
  width:22px;
  height:22px;
  fill:white;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

/* BARRA */
.progress-box{
  position:relative;
  height:22px;
  background:#1b1b1b;
  border-radius:25px;
  overflow:hidden;
  margin-top:18px;
  box-shadow:
    inset 0 2px 5px rgba(0,0,0,.5),
    0 4px 10px rgba(0,0,0,.28);
}

.progress-bar{
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#00ff88,#25D366);
  animation:countdown 30s linear forwards;
}

.timer{
  position:absolute;
  width:100%;
  top:0;
  left:0;
  line-height:22px;
  font-size:13px;
  font-weight:bold;
  text-shadow:0 1px 2px rgba(0,0,0,.5);
}

@keyframes countdown{
  from{width:100%;}
  to{width:0%;}
}

/* TEXTO */
.texto{
  margin:12px 0;
  font-weight:bold;
  font-size:16px;
}

.gold{
  color:#ffd76a;
}

/* SLOTS */
.slots-title{
  margin-top:20px;
  font-size:22px;
  font-weight:900;
}

.slots-subtitle{
  margin-top:4px;
  font-size:13px;
  color:rgba(255,255,255,.9);
}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-top:12px;
}

.slot-card{
  background:rgba(255,255,255,.08);
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.15);
}

.slot-card img{
  width:100%;
  height:110px;
  object-fit:cover;
  display:block;
}

.slot-name{
  background:rgba(0,0,0,.5);
  padding:8px;
  font-weight:800;
  font-size:13px;
}
</style>
</head>
