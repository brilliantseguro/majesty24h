<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Majesty</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:
  linear-gradient(rgba(0,80,30,.75),rgba(0,80,30,.85)),
  url('fondo.png');
  background-size:cover;
}

.container{
  max-width:420px;
  margin:auto;
  padding:18px 20px 30px;
}

/* LOGOS */
.logo-top{
  max-width:240px;
  margin:-10px auto 10px;
  display:block;
}

.logo-bottom{
  max-width:160px;
  margin:50px auto 20px;
  display:block;
}

/* TOAST */
.toast{
  margin:0 auto 14px;
  background:rgba(255,255,255,.12);
  padding:12px;
  border-radius:14px;
}

.city{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  color:rgba(210,210,210,.85);
  font-size:13px;
  font-weight:700;
}

/* 📍 ICONO REAL */
.city svg{
  width:14px;
  height:14px;
  fill:rgba(210,210,210,.85);
}

.stars{
  color:#ffd76a;
  margin:3px 0;
}

.label{font-weight:900;}
.action{color:#00ff88;font-weight:900;}

/* BOTON */
.btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:linear-gradient(180deg,#31e97b,#18b957);
  color:#fff;
  padding:16px 28px;
  border-radius:999px;
  font-size:19px;
  font-weight:900;
  margin:22px 0;
  text-decoration:none;
  border:2px solid rgba(0,0,0,.35);
  box-shadow:
  0 0 25px rgba(37,211,102,1),
  0 10px 25px rgba(0,0,0,.3);
  animation:pulse .8s infinite;
}

/* 💬 ICONO WHATSAPP REAL */
.btn svg{
  width:22px;
  height:22px;
  fill:white;
}

@keyframes pulse{
  50%{transform:scale(1.12);}
}

/* BARRA */
.progress-box{
  position:relative;
  height:22px;
  border-radius:25px;
  overflow:hidden;
  margin-top:18px;
  background:
  repeating-linear-gradient(
  -45deg,
  rgba(255,255,255,.10) 0px,
  rgba(255,255,255,.10) 8px,
  rgba(255,255,255,.03) 8px,
  rgba(255,255,255,.03) 16px);
}

.progress-bar{
  position:absolute;
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#00ff88,#25D366);
  animation:countdown 30s linear forwards;
}

.timer{
  position:absolute;
  width:100%;
  line-height:22px;
  font-weight:bold;
}

@keyframes countdown{
  from{width:100%;}
  to{width:0%;}
}

/* TEXTO */
.texto{
  margin:12px 0;
}

.gold{
  color:#ffd76a;
  font-weight:900;
}

/* SLOTS */
.slots-title{
  margin-top:20px;
  font-size:22px;
  font-weight:900;
}

.slots-subtitle{
  font-size:13px;
}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-top:12px;
}

.slot-card{
  border-radius:14px;
  overflow:hidden;
}

.slot-card img{
  width:100%;
  height:110px;
  object-fit:cover;
}

.slot-name{
  margin:0;
  background:rgba(0,0,0,.5);
  padding:6px;
  font-size:13px;
  font-weight:800;
}
</style>
</head>

</body>
</html>
