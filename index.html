<div class="toast" id="toast">
  <div class="stars">★★★★★</div>
  <div class="msg" id="toastText">Nuevo contacto desde Rosario, Santa Fe</div>
</div>

<style>
.toast{
  max-width: 320px;
  margin: 0 auto 14px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
  padding: 12px 14px;
  border-radius: 14px;
  backdrop-filter: blur(6px);
  box-shadow: 0 8px 20px rgba(0,0,0,.25);
  min-height: 62px;
}
.stars{
  color: #ffd76a;
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 4px;
}
.msg{
  font-size: 14px;
  line-height: 1.3;
  font-weight: 700;
}
</style>

<script>
const mensajes = [
  "Nuevo contacto desde Rosario, Santa Fe",
  "Consulta activa desde Santa Fe Capital",
  "Usuario conectado desde Rafaela",
  "Nueva visita desde Venado Tuerto",
  "Contacto recibido desde Cañada de Gómez",
  "Actividad reciente desde Reconquista",
  "Nueva consulta desde Esperanza",
  "Usuario online desde San Lorenzo",
  "Contacto nuevo desde Villa Constitución",
  "Visita activa desde Santo Tomé"
];

let i = 0;
const toastText = document.getElementById("toastText");

setInterval(() => {
  i = (i + 1) % mensajes.length;
  toastText.textContent = mensajes[i];
}, 2500);
</script>
