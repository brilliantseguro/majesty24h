<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Majesty</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
  background:
    linear-gradient(rgba(0,80,30,.75),rgba(0,80,30,.85)),
    url('fondo.png');
  background-size:cover;
  background-position:center;
}

.container{
  max-width:420px;
  margin:auto;
  padding:18px 20px 30px;
}

/* LOGOS */
.logo-top{
  max-width:300px;
  margin:0 auto 10px;
  display:block;
}

.logo-bottom{
  max-width:160px;
  margin:50px auto 20px;
  display:block;
}

/* TOAST */
.toast{
  margin:-8px auto 14px;
  background:rgba(255,255,255,.12);
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  backdrop-filter:blur(6px);
}

.city{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  color:rgba(210,210,210,.85);
  font-size:13px;
  margin-bottom:4px;
  font-weight:700;
}

.city svg{
  width:14px;
  height:14px;
  fill:#ffcc66;
}

.stars{
  color:#ffd76a;
  font-weight:bold;
  margin-bottom:4px;
}

.label{
  font-weight:900;
}

.action{
  color:#00ff88;
  font-weight:900;
}

/* BOTÓN */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:linear-gradient(180deg,#31e97b,#18b957);
  color:#fff;
  padding:16px 28px;
  border-radius:999px;
  font-size:19px;
  font-weight:900;
  margin:22px 0;
  text-decoration:none;
  border:2px solid rgba(0,0,0,.35);
  box-shadow:
    0 0 22px rgba(37,211,102,.95),
    0 10px 25px rgba(0,0,0,.28);
  animation:pulse 0.85s infinite;
}

.btn svg{
  width:22px;
  height:22px;
  fill:white;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.11);}
  100%{transform:scale(1);}
}

/* BARRA */
.progress-box{
  position:relative;
  height:22px;
  border-radius:25px;
  overflow:hidden;
  margin-top:18px;
  background:
    repeating-linear-gradient(
      -45deg,
      rgba(255,255,255,.10) 0px,
      rgba(255,255,255,.10) 8px,
      rgba(255,255,255,.03) 8px,
      rgba(255,255,255,.03) 16px
    );
  border:1px solid rgba(255,255,255,.10);
}

.progress-bar{
  position:absolute;
  top:0;
  left:0;
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#00ff88,#25D366);
  animation:countdown 30s linear forwards;
}

.timer{
  position:absolute;
  width:100%;
  top:0;
  left:0;
  line-height:22px;
  font-size:13px;
  font-weight:bold;
}

@keyframes countdown{
  from{width:100%;}
  to{width:0%;}
}

/* TEXTO */
.texto{
  margin:12px 0;
  font-size:16px;
}

.gold{
  color:#ffd76a;
  font-weight:900;
}

/* SLOTS */
.slots-title{
  margin-top:20px;
  font-size:22px;
  font-weight:900;
}

.slots-subtitle{
  margin-top:4px;
  font-size:13px;
}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-top:12px;
}

.slot-card{
  background:rgba(255,255,255,.08);
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.15);
}

.slot-card img{
  width:100%;
  height:110px;
  object-fit:cover;
}

.slot-name{
  background:rgba(0,0,0,.5);
  padding:8px;
  font-weight:800;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<img class="logo-top" src="logo.png">

<div class="toast">
<div id="toastText">
<div class="city">
<!-- 📍 ICONO UBICACION -->
<svg viewBox="0 0 24 24">
<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
</svg>
Rosario
</div>
<div class="stars">★★★★★</div>
<div>
<span class="label">usuario:</span> neominb31
<span class="action"> está reclamando el bono</span>
</div>
</div>
</div>

<a class="btn" href="#">
<svg viewBox="0 0 32 32">
<path d="M16 .4C7.4.4.4 7.4.4 16c0 2.8.7 5.5 2.1 7.9L.4 31.6l7.9-2.1c2.3 1.3 5 2.1 7.7 2.1 8.6 0 15.6-7 15.6-15.6S24.6.4 16 .4z"/>
</svg>
RECLAMAR BONO
</a>

<div class="progress-box">
<div class="progress-bar"></div>
<div class="timer" id="timer">30s</div>
</div>

<div class="texto">
Tiempo para reclamar el <strong>BONO</strong> del <span class="gold">30%</span> ...
</div>

<img class="logo-bottom" src="logo2.png">

<div class="slots-title">+3.000 SLOTS</div>
<div class="slots-subtitle">Recomendados de la semana:</div>

<div class="cards-grid">
<div class="slot-card"><img src="slot1.png"><div class="slot-name">Spaceman</div></div>
<div class="slot-card"><img src="slot2.png"><div class="slot-name">Sweet Bonanza</div></div>
<div class="slot-card"><img src="slot3.png"><div class="slot-name">Gates of Olympus</div></div>
<div class="slot-card"><img src="slot4.png"><div class="slot-name">Big Bass</div></div>
</div>

</div>

</body>
</html>
