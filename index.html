<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majesty</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      color: white;

      background:
        linear-gradient(rgba(0, 80, 30, 0.75), rgba(0, 80, 30, 0.85)),
        url('fondo.png');
      background-size: cover;
      background-position: center;
    }

    .container {
      max-width: 420px;
      width: 100%;
      padding: 12px 20px 30px;
    }

    .logo-top {
      max-width: 245px;
      margin: -175px auto 12px;
      display: block;
    }

    .logo-bottom {
      max-width: 160px;
      margin: 60px auto 20px;
      display: block;
    }

    img {
      width: 100%;
      filter: drop-shadow(0 0 12px rgba(0,0,0,0.7));
    }

    .toast {
      max-width: 320px;
      margin: 0 auto 14px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 12px 14px;
      border-radius: 14px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
    }

    .stars {
      color: #ffd76a;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 2px;
    }

    .city {
      color: rgba(210,210,210,0.78);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .user {
      color: #fff;
      font-size: 14px;
    }

    .label {
      font-weight: 900;
    }

    .action {
      color: #00ff88;
      font-weight: 900;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(180deg, #31e97b, #18b957);
      color: white;
      padding: 16px 28px;
      border-radius: 999px;
      font-size: 19px;
      font-weight: 900;
      margin: 22px 0;
      text-decoration: none;
      animation: pulse 1.3s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .progress-box {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #25D366, #00ff88);
      animation: countdown 30s linear forwards;
    }

    @keyframes countdown {
      from { width: 100%; }
      to { width: 0%; }
    }

    .texto {
      margin: 10px 0 14px;
      font-size: 18px;
      font-weight: bold;
    }

    .gold {
      color: #ffd76a;
      font-weight: 900;
    }

    /* CARDS */
    .cards-section {
      margin-top: 10px;
    }

    .cards-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .slot-card {
      background: rgba(255,255,255,0.1);
      border-radius: 14px;
      overflow: hidden;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .slot-card img {
      height: 110px;
      object-fit: cover;
    }

    .slot-name {
      padding: 8px;
      font-size: 13px;
      font-weight: 800;
    }

  </style>
</head>

<body>

  <div class="container">

    <img class="logo-top" src="logo.png">

    <div class="toast">
      <div class="stars">★★★★★</div>
      <div id="toastText">
        <div class="city">Rosario</div>
        <div class="user">
          <span class="label">usuario:</span> neominb31
          <span class="action"> está reclamando el bono</span>
        </div>
      </div>
    </div>

    <a class="btn"
       href="https://wa.me/543413673831?text=Holaa%20vengo%20a%20jug4r%20con%20mi%2030%25%20EXTRA%20por%20parte%20de%20Noraly%20Barrionuevo%20🥳🎁%20codigo:%20al%20azar%20todo%20el%20tiempo"
       target="_blank">
       RECLAMAR BONO
    </a>

    <div class="progress-box">
      <div class="progress-bar"></div>
    </div>

    <div class="texto">
      Tiempo para reclamar el BONO del <span class="gold">30%</span>...
    </div>

    <img class="logo-bottom" src="logo2.png">

    <!-- SECCIÓN CARDS -->
    <div class="cards-section">
      <div class="cards-title">Juegos disponibles</div>

      <div class="cards-grid">
        <div class="slot-card">
          <img src="slot1.png">
          <div class="slot-name">Spaceman</div>
        </div>

        <div class="slot-card">
          <img src="slot2.png">
          <div class="slot-name">Sweet Bonanza</div>
        </div>

        <div class="slot-card">
          <img src="slot3.png">
          <div class="slot-name">Gates of Olympus</div>
        </div>

        <div class="slot-card">
          <img src="slot4.png">
          <div class="slot-name">Big Bass</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    let mensajes = [
      {city:"Rosario", user:"neominb31"},
      {city:"Santa Fe Capital", user:"marianb43"},
      {city:"Rafaela", user:"lucasnb41"},
      {city:"Venado Tuerto", user:"agus_87"},
      {city:"Reconquista", user:"tino44"},
      {city:"Esperanza", user:"roxii91"},
      {city:"San Lorenzo", user:"mati88"},
      {city:"Villa Constitución", user:"juanp33"},
      {city:"Santo Tomé", user:"luli29"}
    ];

    mensajes = mensajes.sort(() => Math.random() - 0.5);

    let i = 0;
    const toastText = document.getElementById("toastText");

    setInterval(() => {
      i = (i + 1) % mensajes.length;
      const data = mensajes[i];

      toastText.innerHTML = `
        <div class="city">${data.city}</div>
        <div class="user">
          <span class="label">usuario:</span> ${data.user}
          <span class="action"> está reclamando el bono</span>
        </div>
      `;
    }, 2000);
  </script>

</body>
</html>
